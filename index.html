<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div id="overlay">
      <h1 id="title">Space Explorer</h1>
      <p id="instructions">Appuis sur ESPACE pour commencer l'exploration</p>
      <div class="control">
        <p>W - avancer</p>
        <p>S - reculer</p>
        <p>A - gauche</p>
        <p>D - droite</p>
        <p>SHIFT - descendre</p>
        <p>ESPACE - monter</p>
      </div>
    </div>
    <div id="scrollable-content">


    <script type="module" src="/src/main.js"></script>
  </body>
</html>
